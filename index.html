<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>My dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f1f4f9; }
  .container { position: relative; width: 1913px; height: 912px; }
  .bg { position: absolute; top: 0; left: 0; width: 1913px; height: 912px; display: block; }
  .overlay {
    position: absolute;
    top: 237px;
    left: 380px;
    width: 595px;
    height: 349px;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }
  .overlay-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 8px 3px;
    flex-shrink: 0;
  }
  .overlay-title { font-size: 11px; font-weight: 600; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .btn-group { display: flex; align-items: center; gap: 3px; flex-shrink: 0; margin-left: 6px; }
  .icon-btn {
    width: 22px; height: 22px; border-radius: 4px;
    border: 1px solid #e2e8f0; background: #fff; color: #64748b;
    cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
    position: relative; transition: background 0.15s, border-color 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .icon-btn:hover { background: #f8fafc; border-color: #cbd5e1; }
  .icon-btn.active { background: #eff6ff; border-color: #3b82f6; color: #2563eb; }
  .icon-btn .tip {
    opacity: 0; position: absolute; bottom: calc(100% + 4px); right: 0;
    background: #1e293b; color: #f8fafc; font-size: 10px;
    padding: 2px 6px; border-radius: 3px; white-space: nowrap;
    pointer-events: none; transition: opacity 0.15s; z-index: 200;
  }
  .icon-btn:hover .tip { opacity: 1; }
  .chart-wrap { flex: 1; position: relative; min-height: 0; padding: 0 6px 4px 4px; }
  .overlay-footer {
    padding: 2px 8px 4px;
    display: flex; align-items: center; gap: 4px; flex-shrink: 0;
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; background: #5DA5DA; flex-shrink: 0; }
  .legend-label { font-size: 9px; color: #475569; }
  .menu-circle-btn { background: none; border: none; padding: 0; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; flex-shrink: 0; }
  .menu-circle-btn:hover circle:first-child { fill: #bbbbc0; }
</style>
</head>

      <span class="legend-label">Headcount</span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script>
Chart.register(ChartDataLabels);

const hcLabels = ["Mar 25","Apr 25","May 25","Jun 25","Jul 25","Aug 25","Sep 25","Oct 25","Nov 25","Dec 25","Jan 26","Feb 26","Mar 26"];
const hcData   = [1343,1321,1331,1338,1331,1330,1320,1307,1306,1296,1304,1305,1304];
let hcFormat = 'short';
let hcChart  = null;

function shortFmt(v) { return v >= 1000 ? (v/1000).toFixed(1).replace(/\.0$/, '') + 'k' : String(v); }
function longFmt(v)  { return v.toLocaleString(); }

function buildChart() {
  if (hcChart) hcChart.destroy();
  hcChart = new Chart(document.getElementById('headcountChart'), {
    type: 'bar',
    data: {
      labels: hcLabels,
      datasets: [{ label: 'Headcount', data: hcData, backgroundColor: '#5DA5DA', borderRadius: 2, borderSkipped: false }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 16 } },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e293b', titleColor: '#94a3b8', bodyColor: '#f1f5f9',
          padding: 6, cornerRadius: 4,
          callbacks: { label: ctx => ' ' + longFmt(ctx.parsed.y) }
        },
        datalabels: {
          anchor: 'end', align: 'end', offset: -2,
          color: '#64748b',
          font: { size: 8, weight: '500', family: 'Inter, sans-serif' },
          formatter: v => shortFmt(v)
        }
      },
      scales: {
        x: {
          grid: { display: false }, border: { display: false },
          ticks: { color: '#94a3b8', font: { size: 8, family: 'Inter, sans-serif' }, maxRotation: 45, autoSkip: false }
        },
        y: {
          min: 1291, max: 1355,
          grid: { color: '#f1f5f9' }, border: { display: false },
          ticks: { color: '#94a3b8', font: { size: 8, family: 'Inter, sans-serif' }, callback: v => hcFormat === 'short' ? shortFmt(v) : longFmt(v) },
          title: { display: true, text: 'Headcount', color: '#94a3b8', font: { size: 8, family: 'Inter, sans-serif' } }
        }
      }
    }
  });
}

function toggleFormat() {
  hcFormat = hcFormat === 'short' ? 'long' : 'short';
  document.getElementById('fmtBtn').classList.toggle('active', hcFormat === 'long');
  document.getElementById('fmtTip').textContent = hcFormat === 'long' ? 'Switch to abbreviated' : 'Switch to full numbers';
  buildChart();
}

buildChart();
</script>
</body>
</html>
